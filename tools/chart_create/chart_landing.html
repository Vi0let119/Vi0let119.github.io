<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图表生成 — Chart Generator</title>
    <style>
        :root {
            --bg: #f7f6f3;
            --surface: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #8c8c8c;
            --border: #e6e4e0;
            --accent: #5b7b8a;
            --accent-hover: #4a6572;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.05);
            --shadow-lg: 0 2px 4px rgba(0,0,0,0.04), 0 16px 48px rgba(0,0,0,0.06);
            --radius: 14px;
            --font: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            width: 100%;
            text-align: center;
        }

        /* ── Header ── */
        .header-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            color: var(--accent);
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: var(--text);
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 48px;
            line-height: 1.7;
        }

        /* ── Cards ── */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            padding: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(91,123,138,0.03));
            opacity: 0;
            transition: opacity var(--transition);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: #d0cdc8;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .card-quick .card-icon {
            background: #eaf4f0;
            color: #5b8a6f;
        }

        .card-ai .card-icon {
            background: #edf2f7;
            color: #5b7b8a;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            position: relative;
            z-index: 1;
        }

        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-arrow {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%) translateX(0);
            color: var(--text-secondary);
            opacity: 0;
            transition: all var(--transition);
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateY(-50%) translateX(4px);
        }

        /* ── Footer ── */
        .footer {
            margin-top: 36px;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 24px;
            }

            .card {
                padding: 22px;
            }

            .card-arrow {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
        </div>

        <h1 class="title">图表生成</h1>
        <p class="subtitle">
            基于 ECharts / D3 的智能图表工具<br>选择适合你的方式开始
        </p>

        <!-- Cards -->
        <div class="cards">
            <!-- 极速版 -->
            <a href="chart_quick.html" class="card card-quick">
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </div>
                <div class="card-title">极速版</div>
                <div class="card-desc">
                    数据规范，需求明确。<br>粘贴或上传数据，秒级出图。
                </div>
                <div class="card-tags">
                    <span class="tag">柱状图</span>
                    <span class="tag">折线图</span>
                    <span class="tag">饼图</span>
                    <span class="tag">散点图</span>
                </div>
                <div class="card-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
            </a>

            <!-- AI 交互版 -->
            <a href="chart_ai.html" class="card card-ai">
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                </div>
                <div class="card-title">AI 交互版</div>
                <div class="card-desc">
                    数据复杂，格式不规范。<br>AI 引导分析，智能生成图表。
                </div>
                <div class="card-tags">
                    <span class="tag">智能分析</span>
                    <span class="tag">多轮对话</span>
                    <span class="tag">自由格式</span>
                </div>
                <div class="card-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
            </a>
        </div>

        <p class="footer">
            <a href="../../index.html">返回首页</a>
        </p>
    </div>
</body>
</html>
